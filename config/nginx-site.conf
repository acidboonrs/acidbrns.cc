# Nginx configuration for XMPP registration frontend
# Place this file in: /etc/nginx/sites-available/xmpp-registration
# Enable with: sudo ln -s /etc/nginx/sites-available/xmpp-registration /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name acidbrns.cc www.acidbrns.cc;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name acidbrns.cc www.acidbrns.cc;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/acidbrns.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/acidbrns.cc/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/acidbrns.cc/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Diffie-Hellman parameter for DHE ciphersuites
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root directory for static files
    root /var/www/xmpp-registration/frontend;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ =404;
    }

    # API proxy to Flask backend
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (handled by Flask, but can add here as backup)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Logs
    access_log /var/log/nginx/xmpp-registration-access.log;
    error_log /var/log/nginx/xmpp-registration-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
}
